name: Deploy Extension

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Lint
        run: npm run lint

      - name: Check Version Sync
        run: npm run check:version-sync
         
      - name: Build Project
        run: node scripts/build.js
        
      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        
      - name: Build ZIP
        run: npm run build:zip
        
      - name: Extract Latest Changes
        run: |
          awk '/^## \[/{count++} count==2{exit} count==1{print}' CHANGELOG.md > LATEST_CHANGES.md

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          files: Backlog2Redmine-v*.zip
          body_path: LATEST_CHANGES.md
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Register version in backend
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && steps.create_release.outputs.url
        run: node scripts/register-version.js
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          VERSION: ${{ steps.get_version.outputs.version }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.tag }}/Backlog2Redmine-v${{ steps.get_version.outputs.version }}.zip






